<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription | Yummy Universe</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css"/>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .glass-container {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #2c3e50;
            font-weight: 600;
            font-size: 28px;
            margin-bottom: 5px;
        }

        .header p {
            color: #555;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: 600;
            font-size: 14px;
        }

        .input-group input, 
        .input-group select, 
        .input-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.6);
            color: #333;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        /* Ajustement pour le sélecteur de pays */
        .iti { width: 100%; }

        .input-group input:focus, 
        .input-group select:focus, 
        .input-group textarea:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 0 3px rgba(166, 193, 238, 0.5);
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            margin-top: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(118, 75, 162, 0.3);
        }

        @media (max-width: 480px) {
            .glass-container { padding: 25px; }
        }
    </style>
</head>
<body>

    <div class="glass-container">
        <div class="header">
            <h1>Yummy Universe ✨</h1>
            <p>Rejoignez les cours d'anglais exclusifs de Yummy Yummy</p>
        </div>

        <form action="https://formspree.io/f/xaqpeoor" method="POST" id="registrationForm">
            
            <div class="input-group">
                <label for="name">Nom Complet</label>
                <input type="text" id="name" name="name" placeholder="Chancel MBEMBA" required>
            </div>

            <div class="input-group">
                <label for="email">Adresse E-mail</label>
                <input type="email" id="email" name="email" placeholder="chancel@exemple.com" required>
            </div>

            <div class="input-group">
                <label for="whatsapp">Numéro WhatsApp</label>
                <input type="tel" id="whatsapp" name="whatsapp" required>
            </div>

            <div class="input-group">
                <label for="level">Votre niveau actuel</label>
                <select id="level" name="level" required>
                    <option value="" disabled selected>Sélectionnez votre niveau...</option>
                    <option value="A1">Débutant (A1)</option>
                    <option value="A2">Élémentaire (A2)</option>
                    <option value="B1">Intermédiaire (B1)</option>
                    <option value="B2">Avancé (B2)</option>
                </select>
            </div>

            <div class="input-group">
                <label for="goals">Quels sont vos objectifs ?</label>
                <textarea id="goals" name="goals" rows="3" placeholder="Parler couramment, préparer un voyage..." required></textarea>
            </div>

            <input type="hidden" name="full_phone_number" id="full_phone_number">

            <button type="submit" class="btn-submit">Valider mon inscription 🚀</button>

        </form>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>
    <script>
        const phoneInputField = document.querySelector("#whatsapp");
        const phoneInput = window.intlTelInput(phoneInputField, {
            preferredCountries: ["cd", "fr", "be"],
            utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/utils.js",
        });

        const form = document.querySelector("#registrationForm");
        form.addEventListener("submit", (e) => {
            // On récupère le numéro au format international (+243...)
            const fullNumber = phoneInput.getNumber();
            document.querySelector("#full_phone_number").value = fullNumber;
        });
    </script>

</body>
</html>
